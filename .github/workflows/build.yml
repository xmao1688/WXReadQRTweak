name: Build Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          brew install dpkg ldid
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Setup iOS SDK
        run: |
          export THEOS=~/theos
          mkdir -p $THEOS/sdks
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -R /tmp/theos-sdks/*.sdk $THEOS/sdks/ || true
          ls -la $THEOS/sdks/

      - name: Build Package
        env:
          THEOS: ~/theos
        run: |
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WXReadQRTweak-DEB
          path: packages/*.deb
